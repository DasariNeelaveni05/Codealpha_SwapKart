<!DOCTYPE html>
<html>
<head>
    <title>Login - SwapKart</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f8f9fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            width:350px;
            padding:40px;
            border-radius:18px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#1f8f5f;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            background:#1f8f5f;
            border:none;
            color:white;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:18px;
            color:#666;
        }
        .password-box{
    position:relative;
    margin-bottom:18px;
}

.password-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.password-box span{
    position:absolute;
    right:15px;
    top:40%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}
        @media (max-width:768px){

    .container{
        width:90%;
        max-width:400px;
        padding:35px 25px;
    }

    h1{
        font-size:42px;
    }

    input{
        padding:16px;
        font-size:16px;
    }

    button{
        padding:16px;
        font-size:18px;
    }

}

    </style>
</head>

<body>

    <div class="login-box">

        <h1>Welcome Back</h1>

        {% if messages %}
            {% for message in messages %}
                <p style="color:#1b5e20; background:#e8f5e9; padding:10px; border-radius:8px; border:1px solid #c8e6c9; text-align:center; font-weight:bold; margin-bottom:20px; font-size:14px;">
                    ✅ {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        {% if error %}
            <p style="color:#d32f2f; background:#ffebee; padding:10px; border-radius:8px; border:1px solid #ffcdd2; text-align:center; font-weight:bold; margin-bottom:20px; font-size:14px;">
                ⚠️ {{ error }}
            </p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text" 
                   name="username" 
                   value="{{ username|default:'' }}"
                   placeholder="Enter Username"
                   required>

            <div class="password-box">
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required>
                <span id="eye" onclick="togglePassword()">
                    👁️
                </span>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p style="text-align:center; margin-top:20px; color:#555;">
            Don't have an account? <a href="/signup/" style="color:#1f8f5f; font-weight:bold; text-decoration:none; transition:0.2s;" onmouseover="this.style.color='#145e3e'" onmouseout="this.style.color='#1f8f5f'">Sign Up</a>
        </p>

    </div>
<script>

function togglePassword(){

    const password =
        document.getElementById("password");

    const eye =
        document.getElementById("eye");

    if(password.type === "password"){

        password.type = "text";
        eye.innerHTML = "🙈";

    }else{

        password.type = "password";
        eye.innerHTML = "👁️";

    }

}

</script>
</body>

</html>
