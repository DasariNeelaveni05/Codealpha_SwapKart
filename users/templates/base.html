{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{% block meta_description %}SwapKart – India's trusted marketplace to Buy, Sell & Exchange pre-owned products.{% endblock %}"/>
  <title>{% block title %}SwapKart{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/swapkart.css' %}"/>
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}sk-page{% endblock %}">
  {% block navbar %}{% include 'navbar.html' %}{% endblock %}
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  {% block footer %}{% include 'footer.html' %}{% endblock %}
  {% block extra_js %}{% endblock %}
  <script src="{% static 'js/swapkart.js' %}"></script>
</body>
</html>
