
<!DOCTYPE html>
<html>
<head>
    <title>Payment - SwapKart</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

      body{
    font-family:Arial, sans-serif;
    background:#f5f7f6;
    color:#222;
}


        h1{
            text-align:center;
            color:#1f8f5f;
            margin-bottom:35px;
            font-size:38px;
        }


        .product-box h2{
            color:#1f8f5f;
            margin-bottom:10px;
        }

        label{
            display:block;
            margin-bottom:10px;
            color:#1f8f5f;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            margin-bottom:25px;
            border:1px solid #ddd;
            border-radius:12px;
            background:#2a2a2a;
            color:white;
            font-size:15px;
        }

        input:focus,
        textarea:focus{
            outline:none;
            border:1px solid #1f8f5f;
        }

        textarea{
            height:100px;
            resize:none;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#1f8f5f;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#18724c;
            transform:translateY(-3px);
        }
.navbar{
    background:linear-gradient(
        90deg,
        #1f8f5f,
        #111
    );
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:0 3px 15px rgba(0,0,0,0.2);
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a{
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    white-space:nowrap;
    transition:0.3s;
}

.nav-links a:hover{
    background:white;
    color:#1f8f5f;
    transform:translateY(-2px);
}
.checkout-container{
    max-width:1200px;
    margin:40px auto;
    display:flex;
    gap:30px;
    padding:20px;
}

.delivery-section{
    flex:2;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.summary-section{
    flex:1;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    height:fit-content;
}

.summary-section img{
    width:100%;
    height:220px;
    object-fit:contain;
    background:#f8f8f8;
}

.summary-title{
    color:#1f8f5f;
    font-size:24px;
    margin-bottom:10px;
}

.total-box{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid #ddd;
    font-size:22px;
    font-weight:bold;
}

@media(max-width:768px){

    .checkout-container{
        flex-direction:column;
    }

}
select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:20px;

    background:#2a2a2a;
    color:white;

    font-size:15px;
}
    </style>

</head>

<body>
    <div class="navbar">

    <div class="logo">
        ♻️ SwapKart
    </div>

    <div class="nav-links">

        <a href="/home/">🏠 Home</a>

        <a href="/products/">🛍 Products</a>

        <a href="/add-product/">➕ Add Product</a>

        <a href="/cart/">🛒 Cart</a>

        <a href="/my-orders/">📦 Orders</a>

        <a href="/my-uploads/">📤 Uploads</a>

        <a href="/exchange-requests/">📩 Exchanges</a>

        <a href="/logout/">🚪 Logout</a>

    </div>

</div>
    <div class="checkout-container">

    <div class="delivery-section">

        <h1>🚚 Delivery Details</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Full Name</label>
            <input type="text" placeholder="Enter full name">

            <label>Phone Number</label>
            <input type="text" placeholder="Enter phone number">

            <label>Delivery Address</label>
            <textarea placeholder="Enter delivery address"></textarea>

            <label>City</label>
            <input type="text" placeholder="Enter city">
            <label>State</label>

<select name="state" required>
    <option value="">Select State</option>
    <option>Andhra Pradesh</option>
    <option>Telangana</option>
    <option>Karnataka</option>
    <option>Tamil Nadu</option>
    <option>Kerala</option>
    <option>Maharashtra</option>
    <option>Delhi</option>
    <option>Gujarat</option>
    <option>Rajasthan</option>
    <option>Uttar Pradesh</option>
    <label>PIN Code</label>

<input
    type="text"
    id="pincode"
    name="pincode"
    maxlength="6"
    placeholder="Enter PIN Code"
    required>

<p id="location-result"></p>

<label>Payment Method</label>

<select
    style="
    width:100%;
    padding:14px;
    border-radius:12px;
    margin-bottom:25px;
    ">

    <option>Cash On Delivery</option>
    <option>UPI</option>
    <option>Debit Card</option>

</select>

<button type="submit">
    ✅ Place Order

        </form>

    </div>

    <div class="summary-section">

        <img src="{{ product.image.url }}">

        <h2 class="summary-title">

            {{ product.title }}

        </h2>

        <p>

            Product Price : ₹{{ product.price }}

        </p>

        <p>

            Delivery : Free

        </p>

        <p>

            Platform Fee : ₹0

        </p>

        <div class="total-box">

            Total : ₹{{ product.price }}

        </div>

    </div>
<script>

document.getElementById("pincode").addEventListener("input", function(){

    let pin = this.value;

    if(pin.length == 6){

        if(pin.startsWith("518")){
            document.getElementById("location-result").innerHTML =
            "📍 Kurnool, Andhra Pradesh";
        }

        else if(pin.startsWith("500")){
            document.getElementById("location-result").innerHTML =
            "📍 Hyderabad, Telangana";
        }

        else{
            document.getElementById("location-result").innerHTML =
            "📍 Location Found";
        }
    }

});

</script>

</body>
</html>
