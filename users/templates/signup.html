<!DOCTYPE html>
<html>
<head>
    <title>Signup - SwapKart</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .signup-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#00aa55;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#00cc66;
            border:none;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="signup-box">

        <h1>Create Account</h1>

        {% if error %}
            <p style="color:#d32f2f; background:#ffebee; padding:10px; border-radius:8px; border:1px solid #ffcdd2; text-align:center; font-weight:bold; margin-bottom:20px; font-size:14px;">
                ⚠️ {{ error }}
            </p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text" 
                   name="username" 
                   value="{{ username|default:'' }}"
                   placeholder="Enter Username"
                   required>

            <input type="email" 
                   name="email" 
                   value="{{ email|default:'' }}"
                   placeholder="Enter Email"
                   required>

            <input type="password" 
                   name="password" 
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Signup
            </button>

        </form>

        <p style="text-align:center; margin-top:20px; color:#555;">
            Already have an account? <a href="/login/" style="color:#1f8f5f; font-weight:bold; text-decoration:none; transition:0.2s;" onmouseover="this.style.color='#145e3e'" onmouseout="this.style.color='#1f8f5f'">Login</a>
        </p>

    </div>

</body>
</html>
